<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Pedidos - Enlatados MG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { background: #f5f6fa; }
.header { background: #1a237e; color: white; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }
.header a { color: white; text-decoration: none; font-size: 14px; }
.contenido { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
.card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
.card h3 { color: #1a237e; margin-bottom: 18px; font-size: 16px; border-bottom: 2px solid #e8eaf6; padding-bottom: 10px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.campo label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
.campo input, .campo select { width: 100%; padding: 11px 13px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
.campo input:focus { border-color: #1a237e; }
.full { grid-column: 1/-1; }
.btn { padding: 11px 18px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; }
.btn-ok { background: #1a237e; color: white; }
.btn-add { background: #e8f5e9; color: #2e7d32; margin-top: 10px; }
.btn-del { background: #ffebee; color: #c62828; padding: 5px 10px; border: none; border-radius: 6px; cursor: pointer; }
.alerta { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
.alerta.ok { background: #e8f5e9; color: #2e7d32; }
.alerta.err { background: #ffebee; color: #c62828; }
.lineas-tabla { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 14px; }
.lineas-tabla th { background: #e8eaf6; color: #1a237e; padding: 8px 12px; text-align: left; }
.lineas-tabla td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #e8eaf6; color: #1a237e; padding: 10px 12px; text-align: left; }
td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
.badge { display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700; }
.PENDIENTE{background:#fff9c4;color:#f57f17;} .EN_CAMINO{background:#b3e5fc;color:#0277bd;}
.COMPLETADO{background:#e8f5e9;color:#2e7d32;} .CANCELADO{background:#ffebee;color:#c62828;}
.total-box { background: #e8eaf6; border-radius: 8px; padding: 14px 18px; margin-top: 14px; font-size: 15px; font-weight: 700; color: #1a237e; text-align: right; }
.modal-bg { display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center; }
.modal-bg.visible { display:flex; }
.modal { background:white;border-radius:14px;padding:28px;width:400px; }
.modal h4 { color:#1a237e;margin-bottom:16px; }
.modal select,.modal textarea { width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none; }
.modal-btns { display:flex;gap:10px; }
.btn-cancel { background:#e0e0e0;color:#333;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-weight:700; }
</style>
</head><body>
<div class="header"><h1>📋 Gestion de Pedidos</h1><a href="/menu.html">← Volver al menu</a></div>
<div class="contenido">

  <div class="card"><h3>Crear Nuevo Pedido</h3>
    <div class="grid2">
      <div class="campo"><label>CUI del Cliente</label><input type="text" id="cuiCliente" placeholder="CUI registrado"/></div>
      <div class="campo"><label></label></div>
      <div class="campo"><label>Departamento de Origen</label><input type="text" id="origen" placeholder="Ej: Guatemala"/></div>
      <div class="campo"><label>Departamento de Destino</label><input type="text" id="destino" placeholder="Ej: Quetzaltenango"/></div>
    </div>

    <h4 style="margin-top:20px;margin-bottom:12px;color:#333;font-size:14px">Productos a incluir en el pedido:</h4>
    <div id="lineasContainer"></div>
    <button class="btn btn-add" onclick="agregarLinea()">+ Agregar Producto</button>

    <div class="total-box" id="totalBox" style="display:none">Total estimado: <span id="totalEstimado">Q 0.00</span></div>

    <div style="margin-top:16px">
      <button class="btn btn-ok" onclick="crearPedido()">Confirmar y Crear Pedido</button>
    </div>
    <div class="alerta" id="alerta"></div>
  </div>

  <div class="card"><h3>Lista de Pedidos</h3>
    <table><thead><tr><th>#</th><th>Cliente</th><th>Vehiculo / Piloto</th><th>Destino</th><th>Cajas</th><th>Total</th><th>Estado</th><th>Accion</th></tr></thead>
    <tbody id="tabla"><tr><td colspan="8" style="text-align:center;color:#999;padding:20px">Cargando...</td></tr></tbody></table>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h4>Actualizar Estado del Pedido</h4>
    <input type="hidden" id="modalNumero"/>
    <select id="modalEstado">
      <option value="PENDIENTE">Pendiente</option>
      <option value="EN_CAMINO">En Camino</option>
      <option value="COMPLETADO">Completado</option>
      <option value="CANCELADO">Cancelado</option>
    </select>
    <textarea id="modalObs" rows="3" placeholder="Observaciones (opcional)..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-ok" onclick="guardarEstado()">Guardar</button>
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
let catalogoCache = [];
let lineas = [];

async function init() {
  const res = await fetch('/api/catalogo/con-stock');
  catalogoCache = await res.json();
  agregarLinea();
  cargarPedidos();
}

function agregarLinea() {
  const idx = lineas.length;
  lineas.push({ codigoProducto: '', cantidadCajas: 0 });
  const container = document.getElementById('lineasContainer');
  const div = document.createElement('div');
  div.id = `linea-${idx}`;
  div.style.cssText = 'display:grid;grid-template-columns:2fr 1fr auto;gap:10px;align-items:end;margin-bottom:10px;';
  div.innerHTML = `
    <div class="campo">
      <label>Producto</label>
      <select onchange="seleccionarProducto(${idx}, this.value)" style="width:100%;padding:11px 13px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;">
        <option value="">-- Selecciona un producto --</option>
        ${catalogoCache.map(p=>`<option value="${p.codigoProducto}">${p.nombreProducto} (Stock: ${p.cajasEnStock} | Q${p.precioUnitario}/caja)</option>`).join('')}
      </select>
    </div>
    <div class="campo">
      <label>Cantidad de Cajas</label>
      <input type="number" min="1" placeholder="0" oninput="actualizarCantidad(${idx}, this.value)" style="width:100%;padding:11px 13px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;"/>
    </div>
    <button class="btn-del" onclick="eliminarLinea(${idx})" style="margin-bottom:0;height:44px">✕</button>`;
  container.appendChild(div);
  recalcularTotal();
}

function seleccionarProducto(idx, codigo) {
  lineas[idx].codigoProducto = codigo;
  recalcularTotal();
}

function actualizarCantidad(idx, val) {
  lineas[idx].cantidadCajas = parseInt(val) || 0;
  recalcularTotal();
}

function eliminarLinea(idx) {
  const el = document.getElementById(`linea-${idx}`);
  if (el) el.remove();
  lineas[idx] = { codigoProducto: '', cantidadCajas: 0 };
  recalcularTotal();
}

function recalcularTotal() {
  let total = 0;
  lineas.forEach(l => {
    if (l.codigoProducto && l.cantidadCajas > 0) {
      const prod = catalogoCache.find(p => p.codigoProducto === l.codigoProducto);
      if (prod) total += prod.precioUnitario * l.cantidadCajas;
    }
  });
  const box = document.getElementById('totalBox');
  if (total > 0) {
    box.style.display = 'block';
    document.getElementById('totalEstimado').textContent = 'Q ' + total.toFixed(2);
  } else {
    box.style.display = 'none';
  }
}

async function crearPedido() {
  const cuiCliente = document.getElementById('cuiCliente').value.trim();
  const origen     = document.getElementById('origen').value.trim();
  const destino    = document.getElementById('destino').value.trim();

  const lineasValidas = lineas.filter(l => l.codigoProducto && l.cantidadCajas > 0);
  if (!cuiCliente || !destino || lineasValidas.length === 0) {
    mostrarAlerta('err', 'Completa CUI del cliente, destino y al menos un producto'); return;
  }

  const body = { cuiCliente, departamentoOrigen: origen, departamentoDestino: destino, lineas: lineasValidas };
  const res = await fetch('/api/pedidos', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (res.ok) {
    const data = await res.json();
    const msg = data.mensaje ? data.mensaje + ' — Pedidos: ' + data.pedidos.map(p=>p.numeroPedido).join(', ')
                             : `Pedido #${data.numeroPedido} creado. Total: Q${data.totalPedido?.toFixed(2)||'0.00'}`;
    mostrarAlerta('ok', '✅ ' + msg);
    lineas = [];
    document.getElementById('lineasContainer').innerHTML = '';
    document.getElementById('totalBox').style.display = 'none';
    agregarLinea();
    cargarPedidos();
    await init();
  } else {
    const err = await res.text(); mostrarAlerta('err', err);
  }
}

async function cargarPedidos() {
  const res = await fetch('/api/pedidos'); const data = await res.json();
  const tbody = document.getElementById('tabla');
  if (!data.length) { tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:#999;padding:20px">No hay pedidos</td></tr>'; return; }
  tbody.innerHTML = data.map(p=>`<tr>
    <td><strong>#${p.numeroPedido}</strong></td>
    <td>${p.cliente?.nombre||'-'} ${p.cliente?.apellidos||''}</td>
    <td><strong>${p.vehiculo?.placa||'-'}</strong><br><small style="color:#777">${p.piloto?.nombre||'-'}</small></td>
    <td>${p.departamentoDestino}</td>
    <td>${p.totalCajas}</td>
    <td><strong>Q${p.totalPedido?.toFixed(2)||'0.00'}</strong></td>
    <td><span class="badge ${p.estado}">${p.estado.replace('_',' ')}</span></td>
    <td>${p.estado!=='COMPLETADO'&&p.estado!=='CANCELADO'
      ?`<button onclick="abrirModal(${p.numeroPedido},'${p.estado}')" style="padding:5px 12px;border:none;border-radius:6px;background:#e8eaf6;color:#1a237e;cursor:pointer;font-weight:700;font-size:12px">Cambiar Estado</button>`
      :'-'}</td></tr>`).join('');
}

function abrirModal(num,estado){document.getElementById('modalNumero').value=num;document.getElementById('modalEstado').value=estado;document.getElementById('modalObs').value='';document.getElementById('modalBg').classList.add('visible');}
function cerrarModal(){document.getElementById('modalBg').classList.remove('visible');}
async function guardarEstado(){
  const num=document.getElementById('modalNumero').value;
  const estado=document.getElementById('modalEstado').value;
  const obs=document.getElementById('modalObs').value;
  const res=await fetch(`/api/pedidos/${num}/estado`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado,observaciones:obs})});
  if(res.ok){cerrarModal();cargarPedidos();}
  else{const err=await res.text();alert('Error: '+err);}
}
function mostrarAlerta(t,m){const el=document.getElementById('alerta');el.className=`alerta ${t}`;el.textContent=m;el.style.display='block';setTimeout(()=>el.style.display='none',6000);}
init();
</script></body></html>
