<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Usuarios - Enlatados MG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { background: #f5f6fa; }
.header { background: #1a237e; color: white; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }
.header a { color: white; text-decoration: none; font-size: 14px; }
.contenido { max-width: 900px; margin: 30px auto; padding: 0 20px; }
.card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
.card h3 { color: #1a237e; margin-bottom: 18px; font-size: 16px; border-bottom: 2px solid #e8eaf6; padding-bottom: 10px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.campo label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
.campo input { width: 100%; padding: 11px 13px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
.campo input:focus { border-color: #1a237e; }
.btn { padding: 11px 18px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; margin-top: 14px; background: #1a237e; color: white; }
.alerta { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
.alerta.ok { background: #e8f5e9; color: #2e7d32; }
.alerta.err { background: #ffebee; color: #c62828; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #e8eaf6; color: #1a237e; padding: 10px 12px; text-align: left; }
td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
.btn-sm { padding:4px 10px;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;margin-right:4px; }
.btn-edit { background:#e3f2fd;color:#1565c0; } .btn-del { background:#ffebee;color:#c62828; }
.modal-bg { display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center; }
.modal-bg.visible { display:flex; }
.modal { background:white;border-radius:14px;padding:28px;width:400px; }
.modal h4 { color:#1a237e;margin-bottom:16px; }
.modal-btns { display:flex;gap:10px;margin-top:14px; }
.btn-cancel { background:#e0e0e0;color:#333;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-weight:700; }
</style>
</head><body>
<div class="header"><h1>👤 Gestion de Usuarios</h1><a href="/menu.html">← Volver al menu</a></div>
<div class="contenido">
  <div class="card"><h3>Usuarios del Sistema</h3>
    <table><thead><tr><th>ID</th><th>Nombre</th><th>Apellidos</th><th>Acciones</th></tr></thead>
    <tbody id="tabla"><tr><td colspan="4" style="text-align:center;color:#999;padding:20px">Cargando...</td></tr></tbody></table>
    <div class="alerta" id="alerta"></div>
  </div>
</div>

<!-- Modal Editar -->
<div class="modal-bg" id="modalEditar">
  <div class="modal">
    <h4>✏️ Editar Usuario</h4>
    <input type="hidden" id="editId"/>
    <div class="grid">
      <div class="campo"><label>Nombre</label><input type="text" id="editNombre"/></div>
      <div class="campo"><label>Apellidos</label><input type="text" id="editApellidos"/></div>
    </div>
    <div class="campo" style="margin-top:14px"><label>Nueva Contrasena (dejar vacio para no cambiar)</label><input type="password" id="editContrasena" placeholder="Nueva contrasena (opcional)"/></div>
    <div class="modal-btns">
      <button class="btn" onclick="guardarEdicion()">Guardar Cambios</button>
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
async function cargar() {
  const res=await fetch('/api/usuarios'); const data=await res.json();
  const tbody=document.getElementById('tabla');
  if(!data.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:#999;padding:20px">No hay usuarios</td></tr>';return;}
  tbody.innerHTML=data.map(u=>`<tr><td><strong>#${u.id}</strong></td><td>${u.nombre||''}</td><td>${u.apellidos||'-'}</td>
    <td><button class="btn-sm btn-edit" onclick="abrirEditar(${u.id},'${u.nombre||''}','${u.apellidos||''}')">Editar</button>
        <button class="btn-sm btn-del" onclick="eliminar(${u.id},'${u.nombre||''}')">Eliminar</button></td></tr>`).join('');
}

function abrirEditar(id,nombre,apellidos) {
  document.getElementById('editId').value=id; document.getElementById('editNombre').value=nombre;
  document.getElementById('editApellidos').value=apellidos; document.getElementById('editContrasena').value='';
  document.getElementById('modalEditar').classList.add('visible');
}

async function guardarEdicion() {
  const id=document.getElementById('editId').value;
  const body={nombre:document.getElementById('editNombre').value,apellidos:document.getElementById('editApellidos').value};
  const nueva=document.getElementById('editContrasena').value;
  if(nueva) body.contrasena=nueva;
  const res=await fetch(`/api/usuarios/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.ok){cerrarModal();cargar();mostrarAlerta('ok','Usuario actualizado');}
  else{const err=await res.text();mostrarAlerta('err',err);}
}

async function eliminar(id,nombre) {
  if(!confirm(`Eliminar al usuario "${nombre}" (#${id})?`)) return;
  const res=await fetch(`/api/usuarios/${id}`,{method:'DELETE'});
  if(res.ok) cargar();
  else{const err=await res.text();mostrarAlerta('err',err);}
}

function cerrarModal(){document.getElementById('modalEditar').classList.remove('visible');}
function mostrarAlerta(t,m){const el=document.getElementById('alerta');el.className=`alerta ${t}`;el.textContent=m;el.style.display='block';setTimeout(()=>el.style.display='none',4000);}
cargar();
</script></body></html>
